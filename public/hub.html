<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LifeView Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="page-dashboard">
  <div class="shell" id="shell">
    <main class="main">
      <div class="top hub-hero">
        <div>
          <p class="eyebrow">LifeView Central</p>
          <h1 id="title"></h1>
          <p class="lead">Hospital-wide patient monitoring for faster coordination and safer teamwork.</p>
          <p class="small">Yaounde General Hospital</p>
        </div>
        <a class="btn" href="roster.html">Open Monitoring Wall</a>
      </div>

      <div class="grid" id="summary"></div>

      <h2 id="departments">Departments and Services</h2>
      <div class="grid" id="tiles"></div>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    ensureAuth();
    shell.insertAdjacentHTML('afterbegin', side('hub'));
    title.textContent = t('hub');

    async function load(){
      summary.innerHTML = '<div class="card"><div class="small">Loading dashboard...</div></div>';
      const r = await api('/api/reports/summary');
      summary.innerHTML = `
        <div class="card"><div class="small">Total patients</div><div class="stat">${r.summary.total}</div></div>
        <div class="card"><div class="small">${t('critical')}</div><div class="stat">${r.summary.critical}</div></div>
        <div class="card"><div class="small">${t('watch')}</div><div class="stat">${r.summary.watch}</div></div>
        <div class="card"><div class="small">${t('stable')}</div><div class="stat">${r.summary.stable}</div></div>`;

      const s = await api('/api/services');
      const required = ['ICU','Emergency','Surgery','Radiology','Maternity','Pediatrics','Laboratory','Pharmacy','Biomedical','Administration'];
      const map = new Map((s.services || []).map(x => [x.name, x]));
      tiles.innerHTML = required.map(name => {
        const u = map.get(name) || {
          name,
          type: 'Department',
          status: 'Ready',
          description: 'Department workspace for patients, alerts, devices, staffing, and reporting.'
        };
        return `<div class="card department-card">
          <h2>${u.name}</h2>
          <span class="badge">${u.type}</span>
          <span class="badge stable">${u.status}</span>
          <p class="small">${u.description}</p>
          <a class="btn" href="roster.html?unit=${encodeURIComponent(u.name)}">${t('open')}</a>
        </div>`;
      }).join('');
    }

    load().catch(e => {
      summary.innerHTML = `<div class="card"><b>Could not load dashboard</b><p class="small">${e.error || 'Please sign in again.'}</p></div>`;
    });
  </script>
</body>
</html>
