<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LifeView Workspace</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="page-dashboard">
  <div class="shell" id="shell">
    <main class="main">
      <div id="workspaceHeader"></div>

      <section class="hub-hero">
        <div class="top" style="margin:0">
          <div>
            <p class="eyebrow">Clinical operations</p>
            <h1 id="title">Patient monitoring dashboard</h1>
            <p class="lead">Live patient overview, department workload, device connectivity, risk queue, and reports for the signed-in hospital workspace.</p>
          </div>
          <a class="btn" href="monitoring-wall.html">Open Monitoring Wall</a>
        </div>
      </section>

      <div class="grid stat-grid" id="summary"></div>

      <div class="top">
        <div>
          <h2 id="departments">Departments and Services</h2>
          <p class="small">Hospital services are loaded from this tenant workspace.</p>
        </div>
      </div>
      <div class="grid" id="tiles"></div>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    ensureAuth();
    shell.insertAdjacentHTML('afterbegin', side('hub'));
    mountWorkspaceTop(workspaceHeader, 'LifeView Central', { subtitle: 'Branch selector, role context, notifications, language, and logout are available here.' });

    async function load(){
      summary.innerHTML = '<div class="card"><div class="small">Loading dashboard...</div></div>';
      const r = await api('/api/reports/summary');
      summary.innerHTML = `
        <div class="card"><div class="small">Total patients</div><div class="stat">${r.summary.total}</div></div>
        <div class="card"><div class="small">${t('critical')}</div><div class="stat">${r.summary.critical}</div></div>
        <div class="card"><div class="small">${t('watch')}</div><div class="stat">${r.summary.watch}</div></div>
        <div class="card"><div class="small">${t('stable')}</div><div class="stat">${r.summary.stable}</div></div>`;

      const s = await api('/api/services');
      tiles.innerHTML = (s.services || []).map(u => `
        <article class="card department-card">
          <h2>${escapeHtml(u.name)}</h2>
          <div>
            <span class="badge">${escapeHtml(u.type || 'Department')}</span>
            <span class="badge stable">${escapeHtml(u.status || 'active')}</span>
          </div>
          <p class="small">${escapeHtml(u.description || 'Department workspace for patients, alerts, devices, staffing, and reporting.')}</p>
          <a class="btn" href="roster.html?unit=${encodeURIComponent(u.name)}">${t('open')}</a>
        </article>`).join('');
    }

    load().catch(e => {
      summary.innerHTML = `<div class="card"><b>Could not load dashboard</b><p class="small">${escapeHtml(e.error || 'Please sign in again.')}</p></div>`;
    });
  </script>
</body>
</html>
