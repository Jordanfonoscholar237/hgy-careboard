
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LifeView Hub</title><link rel="stylesheet" href="assets/style.css"></head><body><div class="shell" id="shell"><main class="main"><div class="top"><div><h1 id="title"></h1><p class="small">YAOUNDE GENERAL HOSPITAL</p></div></div><div class="grid" id="summary"></div><h2>Departments and Services</h2><div class="grid" id="tiles"></div></main></div><script src="assets/app.js"></script><script>
ensureAuth();shell.insertAdjacentHTML('afterbegin',side('hub'));title.textContent=t('hub');async function load(){const r=await api('/api/reports/summary');summary.innerHTML=`<div class="card"><div class="small">Total</div><div class="stat">${r.summary.total}</div></div><div class="card"><div class="small">${t('critical')}</div><div class="stat">${r.summary.critical}</div></div><div class="card"><div class="small">${t('watch')}</div><div class="stat">${r.summary.watch}</div></div>`;const s=await api('/api/services');s.services.forEach(u=>{const d=document.createElement('div');d.className='card';d.innerHTML=`<h2>${u.name}</h2><span class="badge">${u.type}</span><span class="badge stable">${u.status}</span><p class="small">${u.description}</p><a class="btn" href="roster.html?unit=${encodeURIComponent(u.name)}">${t('open')}</a>`;tiles.appendChild(d)})}load();
</script></body></html>
