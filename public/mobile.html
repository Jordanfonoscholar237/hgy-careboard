<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <title>LifeView Central Mobile</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="card mobile-card">
    <div class="brand-lockup">
      <span class="brand-mark" aria-hidden="true"><span></span></span>
      <span>
        <strong>LifeView Mobile Viewer</strong>
        <small>Yaounde General Hospital</small>
      </span>
    </div>
    <p class="lead">Fast ward-round access for clinicians, nurses, and biomedical support teams.</p>
    <div class="grid">
      <div class="card"><b>Critical alerts</b><p class="small">Review bed-level status from a phone or tablet.</p></div>
      <div class="card"><b>Patient context</b><p class="small">Open patient details, orders, labs, imaging, and notes.</p></div>
    </div>
    <a class="btn" href="index.html" style="margin-top:16px">Open Web App</a>
  </main>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
    }
  </script>
</body>
</html>
