<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patients</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell" id="shell">
    <main class="main">
      <div class="top">
        <div>
          <h1 id="title"></h1>
          <p class="small">Yaounde General Hospital</p>
        </div>
        <button id="addBtn" class="btn"></button>
      </div>

      <div class="grid stat-grid">
        <div class="card"><div class="small">Total</div><div class="stat" id="statTotal">0</div></div>
        <div class="card"><div class="small">ICU</div><div class="stat" id="statICU">0</div></div>
        <div class="card"><div class="small">Critical</div><div class="stat" id="statCritical">0</div></div>
      </div>

      <div class="card">
        <div class="top filters">
          <input id="q" class="input" style="max-width:380px">
          <select id="unitFilter" class="input" style="max-width:220px">
            <option value=""></option>
            <option>ICU</option>
            <option>Emergency</option>
            <option>Radiology</option>
            <option>Surgery</option>
            <option>Pediatrics</option>
            <option>Maternity</option>
            <option>Internal Med</option>
          </select>
          <select id="statusFilter" class="input" style="max-width:200px">
            <option value="">All status</option>
            <option value="critical">Critical</option>
            <option value="watch">Watch</option>
            <option value="stable">Stable</option>
          </select>
        </div>
        <div id="list" class="grid"></div>
      </div>
    </main>
  </div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <h2 id="modalTitle"></h2>
      <input type="hidden" id="pId">
      <div class="form">
        <div><label id="lblName"></label><input id="pName" class="input"></div>
        <div><label id="lblMrn"></label><input id="pMrn" class="input"></div>
        <div>
          <label id="lblUnit"></label>
          <select id="pUnit" class="input">
            <option>ICU</option>
            <option>Emergency</option>
            <option>Radiology</option>
            <option>Surgery</option>
            <option>Pediatrics</option>
            <option>Maternity</option>
            <option>Internal Med</option>
          </select>
        </div>
        <div><label id="lblBed"></label><input id="pBed" class="input"></div>
        <div><label id="lblAge"></label><input id="pAge" class="input"></div>
        <div><label id="lblSex"></label><select id="pSex" class="input"><option></option><option>F</option><option>M</option></select></div>
        <div><label id="lblTag"></label><select id="pTag" class="input"><option></option><option>High Risk</option><option>Allergy</option><option>Isolation</option></select></div>
        <div><label id="lblStatus"></label><select id="pStatus" class="input"><option value="stable">stable</option><option value="watch">watch</option><option value="critical">critical</option></select></div>
        <div><label id="lblDx"></label><input id="pDiagnosis" class="input"></div>
        <div><label id="lblAlg"></label><input id="pAllergies" class="input"></div>
        <div style="grid-column:1/-1"><label id="lblNotes"></label><textarea id="pNotes" class="input"></textarea></div>
      </div>
      <div class="actions">
        <button id="deleteBtn" class="btn red" style="display:none"></button>
        <button id="closeBtn" class="btn secondary">Cancel</button>
        <button id="saveBtn" class="btn"></button>
      </div>
      <p id="formMsg" class="small"></p>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    ensureAuth();
    shell.insertAdjacentHTML('afterbegin', side('patients'));

    let currentUnit = new URL(location.href).searchParams.get('unit') || '';
    unitFilter.value = currentUnit;

    function loc(){
      title.textContent = t('patients');
      addBtn.textContent = t('add');
      q.placeholder = t('search');
      unitFilter.options[0].text = t('all');
      modalTitle.textContent = t('patients');
      lblName.textContent = t('name');
      lblMrn.textContent = t('mrn');
      lblUnit.textContent = t('unit');
      lblBed.textContent = t('bed');
      lblAge.textContent = t('age');
      lblSex.textContent = t('sex');
      lblTag.textContent = t('tag');
      lblStatus.textContent = t('status');
      lblNotes.textContent = t('notes');
      lblDx.textContent = t('diagnosis');
      lblAlg.textContent = t('allergies');
      saveBtn.textContent = t('save');
      deleteBtn.textContent = t('delete');
    }

    async function load(){
      const params = new URLSearchParams({unit: unitFilter.value, q: q.value, status: statusFilter.value});
      const r = await api('/api/patients?' + params);
      render(r.patients);
    }

    function render(ps){
      list.innerHTML = '';
      statTotal.textContent = ps.length;
      statICU.textContent = ps.filter(p => p.unit === 'ICU').length;
      statCritical.textContent = ps.filter(p => p.status === 'critical').length;

      ps.forEach(p => {
        const v = {
          hr: 74 + Math.round(Math.random() * 14),
          spo2: 95 + Math.round(Math.random() * 4),
          bp: (110 + Math.round(Math.random() * 24)) + '/' + (68 + Math.round(Math.random() * 14))
        };
        const d = document.createElement('div');
        d.className = 'card patient';
        d.innerHTML = `<div class="avatar">${initials(p.name)}</div>
          <div style="flex:1">
            <div class="top" style="margin:0">
              <div><b>${p.name}</b><div class="small">${p.mrn} - ${p.unit} - ${p.bed}</div></div>
              ${statusBadge(p.status)}
            </div>
            <span class="badge">HR ${v.hr}</span>
            <span class="badge">SpO2 ${v.spo2}%</span>
            <span class="badge">BP ${v.bp}</span>
            ${p.tag ? `<span class="badge">${p.tag}</span>` : ''}
            <p class="small">${p.diagnosis || ''} ${p.notes || ''}</p>
            <button class="btn secondary" onclick='edit(${JSON.stringify(p)})'>${t('edit')}</button>
            <a class="btn" href="patient.html?id=${p.id}">${t('monitoring')}</a>
          </div>`;
        list.appendChild(d);
      });
    }

    function openAdd(){
      pId.value = '';
      ['pName','pMrn','pBed','pAge','pNotes','pDiagnosis','pAllergies'].forEach(id => document.getElementById(id).value = '');
      pUnit.value = 'ICU';
      pSex.value = '';
      pTag.value = '';
      pStatus.value = 'stable';
      deleteBtn.style.display = 'none';
      modal.classList.add('open');
    }

    function edit(p){
      pId.value = p.id;
      pName.value = p.name;
      pMrn.value = p.mrn;
      pUnit.value = p.unit;
      pBed.value = p.bed;
      pAge.value = p.age || '';
      pSex.value = p.sex || '';
      pTag.value = p.tag || '';
      pStatus.value = p.status || 'stable';
      pNotes.value = p.notes || '';
      pDiagnosis.value = p.diagnosis || '';
      pAllergies.value = p.allergies || '';
      deleteBtn.style.display = 'inline-flex';
      modal.classList.add('open');
    }

    saveBtn.onclick = async () => {
      const body = {
        name: pName.value,
        mrn: pMrn.value,
        unit: pUnit.value,
        bed: pBed.value,
        age: pAge.value,
        sex: pSex.value,
        tag: pTag.value,
        status: pStatus.value,
        notes: pNotes.value,
        diagnosis: pDiagnosis.value,
        allergies: pAllergies.value
      };
      try{
        if(!body.name || !body.mrn || !body.unit || !body.bed) throw {error: t('missing')};
        if(pId.value) await api('/api/patients/' + pId.value, {method:'PUT', body: JSON.stringify(body)});
        else await api('/api/patients', {method:'POST', body: JSON.stringify(body)});
        modal.classList.remove('open');
        load();
      }catch(e){
        formMsg.textContent = e.error || t('bad');
      }
    };

    deleteBtn.onclick = async () => {
      if(pId.value){
        await api('/api/patients/' + pId.value, {method:'DELETE'});
        modal.classList.remove('open');
        load();
      }
    };
    closeBtn.onclick = () => modal.classList.remove('open');
    addBtn.onclick = openAdd;
    q.oninput = load;
    unitFilter.onchange = load;
    statusFilter.onchange = load;
    loc();
    load();
  </script>
</body>
</html>
