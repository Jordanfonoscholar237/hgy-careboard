<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reports</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell" id="shell">
    <main class="main">
      <div id="workspaceHeader"></div>
      <div class="top">
        <div>
          <p class="eyebrow">Operations</p>
          <h1 id="title"></h1>
          <p class="lead">Risk queue, activity summary, and audit trail for the monitoring team.</p>
        </div>
      </div>

      <div class="grid stat-grid" id="summary"></div>
      <h2>AI Risk Queue</h2>
      <div id="riskList" class="grid"></div>
      <h2>Audit</h2>
      <div class="card"><table id="audit"></table></div>
    </main>
  </div>

  <script src="assets/app.js"></script>
  <script>
    ensureAuth();
    shell.insertAdjacentHTML('afterbegin', side('reports'));
    mountWorkspaceTop(workspaceHeader, 'Reports', { subtitle: 'Tenant-scoped risk queue, platform activity, and audit history.' });
    title.textContent = t('reports');

    async function load(){
      const r = await api('/api/reports/summary');
      summary.innerHTML = `
        <div class="card"><div class="small">Total</div><div class="stat">${r.summary.total}</div></div>
        <div class="card"><div class="small">${t('critical')}</div><div class="stat">${r.summary.critical}</div></div>
        <div class="card"><div class="small">${t('watch')}</div><div class="stat">${r.summary.watch}</div></div>
        <div class="card"><div class="small">${t('stable')}</div><div class="stat">${r.summary.stable}</div></div>`;

      const q = await api('/api/ai/hospital');
      riskList.innerHTML = q.ranked.slice(0, 8).map(x => `<div class="card">
        <b>${x.patient.name}</b>
        ${statusBadge(x.patient.status)}
        <p class="small">${x.patient.unit} - ${x.patient.bed}</p>
        <div class="stat">${x.risk.score}</div>
        <p class="small">Risk: ${x.risk.level}</p>
        <a class="btn" href="patient.html?id=${x.patient.id}">${t('open')}</a>
      </div>`).join('');

      const a = await api('/api/audit');
      audit.innerHTML = '<tr><th>Time</th><th>User</th><th>Action</th><th>Target</th></tr>' +
        a.audit.slice(0, 30).map(x => `<tr><td>${x.ts}</td><td>${x.user}</td><td>${x.action}</td><td>${x.target}</td></tr>`).join('');
    }

    load();
  </script>
</body>
</html>
