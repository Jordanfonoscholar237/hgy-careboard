<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LifeView Central</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="page-login">
  <main class="auth auth-single login-screen">
    <section class="card login-unified">
      <div class="brand-hero">
        <div class="brand-lockup brand-center">
          <span class="brand-mark" aria-hidden="true"><span></span></span>
          <span>
            <strong>LifeView Central</strong>
            <small>Yaounde General Hospital</small>
          </span>
        </div>
        <p class="login-eyebrow">Secure staff access</p>
      </div>

      <h1 class="sr-only">LifeView Central staff access</h1>

      <div class="login-panel">
        <div class="panel-heading">
          <span>Workspace</span>
          <h2>Sign in</h2>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="login" id="tabLogin"></button>
          <button class="tab" data-tab="signup" id="tabSignup"></button>
          <button class="tab" data-tab="verify" id="tabVerify"></button>
        </div>
        <div id="msg" class="small alert-line"></div>
        <div id="login" class="tabpane active">
          <label id="lUser"></label>
          <input id="loginUser" class="input" autocomplete="username">
          <label id="lPass"></label>
          <input id="loginPass" class="input" type="password" autocomplete="current-password">
          <button id="loginBtn" class="btn" style="width:100%;margin-top:12px"></button>
        </div>
        <div id="signup" class="tabpane">
          <div class="form">
            <div><label id="sFull"></label><input id="sFullName" class="input"></div>
            <div><label id="sUser"></label><input id="sUsername" class="input"></div>
            <div><label id="sEmail"></label><input id="sEmailInput" class="input" type="email"></div>
            <div><label id="sDept"></label><input id="sDepartment" class="input" placeholder="Department / unit"></div>
            <div>
              <label>Role</label>
              <select id="sRole" class="input">
                <option>doctor</option><option>nurse</option><option>biomedical engineer</option><option>admin</option>
              </select>
            </div>
            <div><label id="sPass"></label><input id="sPassword" class="input" type="password"></div>
            <div><label id="sConfirm"></label><input id="sConfirmInput" class="input" type="password"></div>
          </div>
          <button id="signupBtn" class="btn" style="width:100%;margin-top:12px"></button>
        </div>
        <div id="verify" class="tabpane">
          <label id="vUserLabel"></label>
          <input id="vUsername" class="input">
          <label id="vCodeLabel"></label>
          <input id="vCode" class="input">
          <div class="actions">
            <button id="verifyBtn" class="btn"></button>
            <button id="resendBtn" class="btn secondary"></button>
          </div>
        </div>
      </div>

      <div class="login-footer">
        <select id="lang" class="input">
          <option value="en">English</option>
          <option value="fr">Francais</option>
        </select>
        <div class="actions">
          <a class="btn secondary" href="patient-login.html">Patient Portal</a>
          <a class="btn secondary" href="mobile.html">Mobile/PWA</a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/app.js"></script>
  <script>
    attachLang();
    function loc(){
      tabLogin.textContent=t('signin'); tabSignup.textContent=t('signup'); tabVerify.textContent=t('verify');
      lUser.textContent=t('username'); lPass.textContent=t('password'); loginBtn.textContent=t('login');
      sFull.textContent=t('fullName'); sUser.textContent=t('username'); sEmail.textContent=t('email'); sDept.textContent=t('department');
      sPass.textContent=t('password'); sConfirm.textContent=t('confirm'); signupBtn.textContent=t('signup');
      vUserLabel.textContent=t('username'); vCodeLabel.textContent=t('verification'); verifyBtn.textContent=t('submit'); resendBtn.textContent=t('resend');
    }
    document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tabpane').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); document.getElementById(b.dataset.tab).classList.add('active');
    });
    loginBtn.onclick=async()=>{
      msg.textContent='Signing in...';
      try{
        const r=await api('/api/login',{method:'POST',body:JSON.stringify({username:loginUser.value,password:loginPass.value})});
        setToken(r.token); localStorage.setItem('lifeview_user',JSON.stringify(r.user)); location.href='hub.html';
      }catch(e){
        msg.textContent=(e.needsVerification?t('verify')+': ':'')+(e.error||t('bad'));
        if(e.needsVerification){ vUsername.value=loginUser.value; document.querySelector('[data-tab="verify"]').click(); }
      }
    };
    signupBtn.onclick=async()=>{
      msg.textContent='';
      if(sPassword.value!==sConfirmInput.value){ msg.textContent='Passwords do not match'; return; }
      try{
        const r=await api('/api/signup',{method:'POST',body:JSON.stringify({fullName:sFullName.value,username:sUsername.value,email:sEmailInput.value,department:sDepartment.value,role:sRole.value,password:sPassword.value})});
        msg.textContent=t('codeSent')+(r.devOtp?` ${t('devCode')}: ${r.devOtp}`:'');
        vUsername.value=sUsername.value; document.querySelector('[data-tab="verify"]').click();
      }catch(e){ msg.textContent=e.error||t('bad'); }
    };
    verifyBtn.onclick=async()=>{
      try{ await api('/api/verify',{method:'POST',body:JSON.stringify({username:vUsername.value,code:vCode.value})}); msg.textContent='Verified. You can login now.'; document.querySelector('[data-tab="login"]').click(); }
      catch(e){ msg.textContent=e.error||t('bad'); }
    };
    resendBtn.onclick=async()=>{
      try{ const r=await api('/api/resend-code',{method:'POST',body:JSON.stringify({username:vUsername.value})}); msg.textContent=t('codeSent')+(r.devOtp?` ${t('devCode')}: ${r.devOtp}`:''); }
      catch(e){ msg.textContent=e.error||t('bad'); }
    };
    loc();
  </script>
</body>
</html>
