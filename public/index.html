
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HGY CareBoard</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="auth"><div class="card"><img class="logo" src="assets/hgy-sign.svg"><h1>HGY CareBoard</h1><p class="small">YAOUNDE GENERAL HOSPITAL — professional monitoring suite</p><select id="lang" class="input" style="max-width:180px"><option value="en">English</option><option value="fr">Français</option></select><p class="small" id="demoText"></p><div class="actions" style="justify-content:flex-start"><a class="btn secondary" href="patient-login.html">Patient Portal</a></div></div><div class="card"><div class="tabs"><button class="tab active" data-tab="login" id="tabLogin"></button><button class="tab" data-tab="signup" id="tabSignup"></button><button class="tab" data-tab="verify" id="tabVerify"></button></div><div id="msg" class="small" style="margin:.6rem 0"></div><div id="login" class="tabpane active"><label id="lUser"></label><input id="loginUser" class="input"><label id="lPass"></label><input id="loginPass" class="input" type="password"><button id="loginBtn" class="btn" style="width:100%;margin-top:12px"></button></div><div id="signup" class="tabpane"><div class="form"><div><label id="sFull"></label><input id="sFullName" class="input"></div><div><label id="sUser"></label><input id="sUsername" class="input"></div><div><label id="sEmail"></label><input id="sEmailInput" class="input" type="email"></div><div><label id="sDept"></label><select id="sDepartment" class="input"><option>ICU</option><option>Emergency</option><option>Radiology</option><option>Surgery</option><option>Pediatrics</option><option>Maternity</option><option>Internal Med</option></select></div><div><label id="sPass"></label><input id="sPassword" class="input" type="password"></div><div><label id="sConfirm"></label><input id="sConfirmInput" class="input" type="password"></div></div><button id="signupBtn" class="btn" style="width:100%;margin-top:12px"></button></div><div id="verify" class="tabpane"><label id="vUserLabel"></label><input id="vUsername" class="input"><label id="vCodeLabel"></label><input id="vCode" class="input"><div class="actions"><button id="verifyBtn" class="btn"></button><button id="resendBtn" class="btn secondary"></button></div></div></div></div><script src="assets/app.js"></script><script>
attachLang();function loc(){tabLogin.textContent=t('signin');tabSignup.textContent=t('signup');tabVerify.textContent=t('verify');demoText.textContent=t('demo');lUser.textContent=t('username');lPass.textContent=t('password');loginBtn.textContent=t('login');sFull.textContent=t('fullName');sUser.textContent=t('username');sEmail.textContent=t('email');sDept.textContent=t('department');sPass.textContent=t('password');sConfirm.textContent=t('confirm');signupBtn.textContent=t('signup');vUserLabel.textContent=t('username');vCodeLabel.textContent=t('verification');verifyBtn.textContent=t('submit');resendBtn.textContent=t('resend')}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabpane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')});loginBtn.onclick=async()=>{msg.textContent='';try{const r=await api('/api/login',{method:'POST',body:JSON.stringify({username:loginUser.value,password:loginPass.value})});setToken(r.token);localStorage.setItem('hgy_user',JSON.stringify(r.user));location.href='hub.html'}catch(e){msg.textContent=(e.needsVerification?t('verify')+': ':'')+(e.error||t('bad'));if(e.needsVerification){vUsername.value=loginUser.value;document.querySelector('[data-tab="verify"]').click()}}};signupBtn.onclick=async()=>{msg.textContent='';if(sPassword.value!==sConfirmInput.value){msg.textContent='Passwords do not match';return}try{const r=await api('/api/signup',{method:'POST',body:JSON.stringify({fullName:sFullName.value,username:sUsername.value,email:sEmailInput.value,department:sDepartment.value,password:sPassword.value})});msg.textContent=t('codeSent')+(r.devOtp?` ${t('devCode')}: ${r.devOtp}`:'');vUsername.value=sUsername.value;document.querySelector('[data-tab="verify"]').click()}catch(e){msg.textContent=e.error||t('bad')}};verifyBtn.onclick=async()=>{try{await api('/api/verify',{method:'POST',body:JSON.stringify({username:vUsername.value,code:vCode.value})});msg.textContent='Verified. You can login now.';document.querySelector('[data-tab="login"]').click()}catch(e){msg.textContent=e.error||t('bad')}};resendBtn.onclick=async()=>{try{const r=await api('/api/resend-code',{method:'POST',body:JSON.stringify({username:vUsername.value})});msg.textContent=t('codeSent')+(r.devOtp?` ${t('devCode')}: ${r.devOtp}`:'')}catch(e){msg.textContent=e.error||t('bad')}};loc();
</script></body></html>
