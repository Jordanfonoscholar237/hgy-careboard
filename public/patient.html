<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Patient Dashboard</title><link rel="stylesheet" href="assets/style.css"></head><body><div class="shell" id="shell"><main class="main"><div class="top"><div><h1 id="title">Patient Dashboard</h1><p class="small" id="sub"></p></div><div class="actions"><div id="voiceToggle" class="voice-chip"><span class="voice-dot"></span><span id="voiceText">Voice assistant off</span></div><div id="autoReadToggle" class="voice-chip"><span class="voice-dot"></span><span id="autoReadText">Auto read off</span></div><a class="btn secondary" href="roster.html">← Patients</a></div></div><div id="patientCard" class="card" style="margin-bottom:14px"></div><div class="tabbar"><button class="tabbtn active" data-tab="overview">Overview</button><button class="tabbtn" data-tab="monitor">Monitor</button><button class="tabbtn" data-tab="ventilator">Ventilator</button><button class="tabbtn" data-tab="notes">Notes</button><button class="tabbtn" data-tab="orders">Orders</button><button class="tabbtn" data-tab="labs">Labs</button><button class="tabbtn" data-tab="imaging">Imaging</button><button class="tabbtn" data-tab="alerts">Alerts</button><button class="tabbtn" data-tab="ai">AI Analysis</button></div><section id="overview" class="tabpane active"><div class="detail-grid"><div class="card"><h2>Patient information</h2><div id="infoGrid" class="info-list"></div></div><div class="card"><h2>Connected devices</h2><div id="devices" class="grid"></div><p class="small">Device data architecture: medical devices → authorized gateway/API → LifeView backend → database → dashboards/mobile → AI-assisted review.</p></div></div></section><section id="monitor" class="tabpane"><div class="grid"><div class="card"><canvas id="HR" class="canvas"></canvas></div><div class="card"><canvas id="SPO2" class="canvas"></canvas></div><div class="card"><canvas id="RR" class="canvas"></canvas></div><div class="card"><canvas id="TEMP" class="canvas"></canvas></div><div class="card"><canvas id="BP_SYS" class="canvas"></canvas></div><div class="card"><canvas id="BP_DIA" class="canvas"></canvas></div></div></section><section id="ventilator" class="tabpane"><div class="grid"><div class="card"><canvas id="PEEP" class="canvas"></canvas></div><div class="card"><canvas id="VT" class="canvas"></canvas></div><div class="card"><canvas id="ETCO2" class="canvas"></canvas></div></div><div class="grid" style="margin-top:14px"><div class="device-card"><b>Mode</b><div>AC/VC</div></div><div class="device-card"><b>FiO₂</b><div>0.45</div></div><div class="device-card"><b>PEEP target</b><div>6 cmH₂O</div></div><div class="device-card"><b>VT target</b><div>420 mL</div></div></div></section><section id="notes" class="tabpane"><div class="card"><h2>Clinical notes</h2><div class="actions"><textarea id="newNote" class="input" rows="2" placeholder="Write a clinical note..."></textarea><button id="addNote" class="btn">Add note</button></div><div id="notesList" class="timeline" style="margin-top:12px"></div></div></section><section id="orders" class="tabpane"><div class="card"><h2>Orders</h2><div class="actions"><textarea id="newOrder" class="input" rows="2" placeholder="Write an order..."></textarea><button id="addOrder" class="btn">Add order</button></div><div id="ordersList" class="timeline" style="margin-top:12px"></div></div></section><section id="labs" class="tabpane"><div class="card"><h2>Laboratory results</h2><div id="labsList" class="timeline"></div></div></section><section id="imaging" class="tabpane"><div class="card"><h2>Imaging</h2><div id="imagingList" class="timeline"></div></div></section><section id="alerts" class="tabpane"><div class="card"><h2>Alerts</h2><div class="actions"><input id="newAlert" class="input" placeholder="Add manual alert..."><select id="alertSeverity" class="input" style="max-width:160px"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select><button id="addAlert" class="btn">Add alert</button></div><div id="alertsList" class="timeline" style="margin-top:12px"></div></div></section><section id="ai" class="tabpane"><div class="card"><h2 id="aiTitle"></h2><button id="runAi" class="btn"></button><div id="aiBox" class="ai-box small" style="margin-top:12px"></div></div></section></main></div><div id="backdrop" class="backdrop"></div><script src="assets/app.js"></script><script>
ensureAuth();shell.insertAdjacentHTML('afterbegin',side('patients'));const id=new URL(location.href).searchParams.get('id');let currentPatient=null, detail=null, voiceOn=false, autoRead=false;function say(txt){if(!voiceOn&&!autoRead)return;if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang=lang()==='fr'?'fr-FR':'en-US';speechSynthesis.speak(u)}function setVoiceUI(){voiceToggle.querySelector('.voice-dot').classList.toggle('on',voiceOn);autoReadToggle.querySelector('.voice-dot').classList.toggle('on',autoRead);voiceText.textContent=voiceOn?'Voice assistant on':'Voice assistant off';autoReadText.textContent=autoRead?'Auto read on':'Auto read off'}voiceToggle.onclick=()=>{voiceOn=!voiceOn;setVoiceUI();if(voiceOn)say('Voice assistant activated.')};autoReadToggle.onclick=()=>{autoRead=!autoRead;setVoiceUI();if(autoRead&&currentPatient)say(`${currentPatient.name}. ${currentPatient.unit}. ${currentPatient.status} status.`)};setVoiceUI();document.querySelectorAll('.tabbtn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabbtn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabpane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active');if(autoRead)say(`${b.textContent} tab opened.`)});function item(title,value){return`<div class="info-item"><b>${title}</b><div>${value||'—'}</div></div>`}function timeline(arr,render){return(arr&&arr.length)?arr.map(render).join(''):'<p class="small">No records yet.</p>'}async function load(){const d=await api('/api/patients/'+id+'/detail');detail=d.detail;currentPatient=detail.patient;title.textContent=currentPatient.name;sub.textContent=`${currentPatient.mrn} • ${currentPatient.unit} • ${currentPatient.bed}`;patientCard.innerHTML=`<div class="patient"><div class="avatar">${initials(currentPatient.name)}</div><div><b>${currentPatient.name}</b> ${statusBadge(currentPatient.status)}<p class="small">${currentPatient.diagnosis||''} ${currentPatient.notes||''}</p><span class="badge">${t('allergies')}: ${currentPatient.allergies||'—'}</span><span class="badge">Admitted: ${new Date(currentPatient.admittedAt||Date.now()).toLocaleString()}</span></div></div>`;infoGrid.innerHTML=[item('MRN',currentPatient.mrn),item('Unit',currentPatient.unit),item('Bed',currentPatient.bed),item('Room',currentPatient.room),item('Admitted',new Date(currentPatient.admittedAt||Date.now()).toLocaleString()),item('Age',currentPatient.age),item('Sex',currentPatient.sex),item('Blood type',currentPatient.bloodType),item('Attending doctor',currentPatient.attending),item('Primary nurse',currentPatient.primaryNurse),item('Diagnosis',currentPatient.diagnosis),item('Allergies',currentPatient.allergies),item('Status',currentPatient.status),item('Tag',currentPatient.tag)].join('');const dm=currentPatient.deviceMap||{};devices.innerHTML=Object.entries(dm).map(([k,v])=>`<div class="device-card"><b>${k}</b><div>${v}</div><span class="badge stable">Connected</span></div>`).join('')||'<div class="empty-state">No device mapping yet.</div>'; api('/api/device/readings?patientId='+currentPatient.id).then(r=>{ if(r.readings.length){ devices.insertAdjacentHTML('beforeend', r.readings.slice(0,4).map(x=>`<div class="device-card"><b>${x.deviceType}</b><div class="small">${x.deviceId} • ${new Date(x.timestamp).toLocaleString()}</div><pre class="small">${JSON.stringify(x.values,null,2)}</pre></div>`).join('')); }}).catch(()=>{});notesList.innerHTML=timeline(detail.notes,x=>`<div class="timeline-item"><b>${x.author}</b><div class="small">${new Date(x.ts).toLocaleString()}</div><p>${x.text}</p></div>`);ordersList.innerHTML=timeline(detail.orders,x=>`<div class="timeline-item"><b>${x.status}</b><div class="small">${x.author} • ${new Date(x.ts).toLocaleString()}</div><p>${x.text}</p></div>`);labsList.innerHTML=timeline(detail.labs,x=>`<div class="timeline-item"><b>${x.test}</b> <span class="badge">${x.flag}</span><div class="small">${new Date(x.ts).toLocaleString()}</div><p>${x.value} ${x.unit}</p></div>`);imagingList.innerHTML=timeline(detail.imaging,x=>`<div class="timeline-item"><b>${x.modality} — ${x.study}</b><span class="badge">${x.status}</span><div class="small">${new Date(x.ts).toLocaleString()}</div><p>${x.summary}</p></div>`);alertsList.innerHTML=timeline(detail.alerts,x=>`<div class="timeline-item"><b>${x.severity}</b><div class="small">${new Date(x.ts).toLocaleString()}</div><p>${x.text}</p></div>`);const r=await api('/api/vitals/'+currentPatient.id);Object.entries(r.vitals).forEach(([k,v])=>drawChart(document.getElementById(k),v,k));enableExpand();if(autoRead)say(`${currentPatient.name}. ${currentPatient.status} status. ${detail.alerts.length} alerts. ${detail.orders.length} orders.`)}addNote.onclick=async()=>{if(!newNote.value.trim())return;await api('/api/patients/'+id+'/notes',{method:'POST',body:JSON.stringify({text:newNote.value})});newNote.value='';load()};addOrder.onclick=async()=>{if(!newOrder.value.trim())return;await api('/api/patients/'+id+'/orders',{method:'POST',body:JSON.stringify({text:newOrder.value})});newOrder.value='';load()};addAlert.onclick=async()=>{if(!newAlert.value.trim())return;await api('/api/patients/'+id+'/alerts',{method:'POST',body:JSON.stringify({text:newAlert.value,severity:alertSeverity.value})});newAlert.value='';load()};aiTitle.textContent=t('ai');runAi.textContent=t('runAi');runAi.onclick=async()=>{aiBox.textContent='Analyzing...';const r=await api('/api/ai/analyze/'+currentPatient.id);const a=r.analysis.fallback||r.analysis;aiBox.textContent=`Demo decision-support only. Not for clinical diagnosis or treatment.

Mode: ${r.analysis.mode}\nRisk: ${a.risk.level.toUpperCase()} (score ${a.risk.score})\n\n${a.summary}\n\nRecommendations:\n- ${a.recommendations.join('\n- ')}\n\n${a.disclaimer}`;if(autoRead)say(a.summary)};load();setInterval(()=>{if(currentPatient)api('/api/vitals/'+currentPatient.id).then(r=>Object.entries(r.vitals).forEach(([k,v])=>drawChart(document.getElementById(k),v,k)))},6000);
</script></body></html>
